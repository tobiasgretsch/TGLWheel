<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steuerung</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- TOKENS (mirrors style.css for consistent look) --- */
        :root {
            --color-bg:         #1a2332;
            --color-surface:    rgba(255, 255, 255, 0.06);
            --color-border:     rgba(255, 255, 255, 0.12);
            --color-accent:     #e74c3c;
            --color-text:       #ffffff;
            --color-text-muted: rgba(255, 255, 255, 0.5);
            --radius-sm: 10px;
            --radius-md: 18px;
            --btn-green:  #27ae60;
            --btn-blue:   #2980b9;
            --btn-red:    #c0392b;
            --btn-orange: #d35400;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: var(--color-bg);
            color: var(--color-text);
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--color-text-muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        /* --- PANELS --- */
        .panel {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: 20px;
        }

        h2 {
            margin: 0 0 16px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--color-text-muted);
        }

        /* --- ROWS --- */
        .row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .row:last-child { margin-bottom: 0; }

        label {
            flex: 1;
            min-width: 160px;
            font-size: 0.9rem;
            color: var(--color-text-muted);
        }

        input[type="number"] {
            width: 90px;
            padding: 10px 12px;
            text-align: center;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 600;
            color: var(--color-text);
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            outline: none;
        }

        input[type="number"]:focus {
            border-color: rgba(255,255,255,0.35);
        }

        /* --- BUTTONS --- */
        button {
            flex: 1;
            min-height: 52px;
            padding: 0 16px;
            font-size: 0.9rem;
            font-family: inherit;
            font-weight: 700;
            letter-spacing: 0.05em;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: #ffffff;
            transition: opacity 0.15s, transform 0.1s;
        }

        button:active  { transform: scale(0.97); }
        button:hover   { opacity: 0.88; }

        .btn-green  { background: var(--btn-green); }
        .btn-blue   { background: var(--btn-blue); }
        .btn-red    { background: var(--btn-red); }
        .btn-orange { background: var(--btn-orange); }

        /* --- DIVIDER --- */
        hr {
            border: none;
            border-top: 1px solid var(--color-border);
            margin: 16px 0;
        }

        /* --- SCOREBOARD --- */
        .score-ctrl {
            display: flex;
            gap: 12px;
        }

        .score-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            padding: 16px 12px;
        }

        .score-box-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--color-text-muted);
        }

        .score-box button {
            width: 100%;
        }

        .btn-score-plus {
            min-height: 68px;
            font-size: 1.8rem;
        }

        .btn-score-minus {
            min-height: 44px;
            font-size: 1rem;
        }

        .btn-full {
            width: 100%;
            margin-top: 12px;
        }

        /* --- STATUS TOAST --- */
        #status-msg {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
        }

        #status-msg.show { opacity: 1; }
        #status-msg.ok   { background: var(--btn-green); }
        #status-msg.err  { background: var(--btn-red); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Steuerung</h1>

        <!-- SPIELSTEUERUNG -->
        <div class="panel">
            <h2>Spielsteuerung</h2>
            <div class="row">
                <button class="btn-green" onclick="sendAction('spin')">RAD DREHEN</button>
                <button class="btn-orange" onclick="sendAction('reset')">ZURÜCKSETZEN</button>
            </div>
        </div>

        <!-- TIMER -->
        <div class="panel">
            <h2>Timer</h2>

            <div class="row">
                <label>Spielzeit (Minuten):</label>
                <input type="number" id="globalTimeInput" value="10" min="1">
            </div>
            <div class="row">
                <button class="btn-blue"  onclick="setTimers()">SETZEN</button>
                <button class="btn-green" onclick="toggleGlobalTimer('start')">START</button>
                <button class="btn-red"   onclick="toggleGlobalTimer('stop')">PAUSE</button>
            </div>

            <hr>

            <div class="row">
                <label>Ergebnisanzeige (Sekunden):</label>
                <input type="number" id="resultTimeInput" value="60" min="5">
                <button class="btn-blue" onclick="setResultDuration()">ÜBERNEHMEN</button>
            </div>

            <hr>

            <div class="row" style="align-items: center;">
                <label>Spielzeit-Schriftgröße:</label>
                <button class="btn-red"   style="flex:0; min-width:52px;" onclick="adjustTimerSize(-0.5)">−</button>
                <span id="timerSizeDisplay" style="min-width:60px; text-align:center; font-weight:700;">3.0 rem</span>
                <button class="btn-green" style="flex:0; min-width:52px;" onclick="adjustTimerSize(+0.5)">+</button>
            </div>
        </div>

        <!-- SPIELSTAND -->
        <div class="panel">
            <h2>Spielstand</h2>
            <div class="score-ctrl">
                <div class="score-box">
                    <div class="score-box-label">Heim</div>
                    <button class="btn-green btn-score-plus" onclick="updateScore('left', 1)">+1</button>
                    <button class="btn-red   btn-score-minus" onclick="updateScore('left', -1)">−1</button>
                </div>
                <div class="score-box">
                    <div class="score-box-label">Gast</div>
                    <button class="btn-green btn-score-plus" onclick="updateScore('right', 1)">+1</button>
                    <button class="btn-red   btn-score-minus" onclick="updateScore('right', -1)">−1</button>
                </div>
            </div>
            <button class="btn-orange btn-full" onclick="sendAction('reset_scores')">SPIELSTAND ZURÜCKSETZEN</button>
        </div>
    </div>

    <div id="status-msg"></div>

    <script>
        let statusTimeout = null;
        let currentTimerSize = 3.0;

        // Sync initial timer size from server so the display stays consistent after refresh.
        fetch('/api/check_status')
            .then(r => r.json())
            .then(s => {
                if (s.config && s.config.global_timer_size !== undefined) {
                    currentTimerSize = s.config.global_timer_size;
                    document.getElementById('timerSizeDisplay').textContent = currentTimerSize.toFixed(1) + ' rem';
                }
            });

        function showStatus(ok, text) {
            const el = document.getElementById('status-msg');
            el.textContent = text;
            el.className = 'show ' + (ok ? 'ok' : 'err');
            clearTimeout(statusTimeout);
            statusTimeout = setTimeout(() => { el.className = ''; }, 2000);
        }

        function sendAction(action, payload = {}) {
            fetch('/api/send_command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, payload })
            })
            .then(res => {
                if (!res.ok) throw new Error(`Server error ${res.status}`);
                showStatus(true, action + ' gesendet');
            })
            .catch(err => showStatus(false, 'Fehler: ' + err.message));
        }

        function updateScore(side, change) {
            sendAction('update_score', { side, change });
        }

        function setTimers() {
            const globalMin = parseInt(document.getElementById('globalTimeInput').value, 10);
            if (isNaN(globalMin) || globalMin < 1) { showStatus(false, 'Ungültiger Wert'); return; }
            sendAction('set_timers', { global_time: globalMin * 60 });
        }

        function setResultDuration() {
            const resultSec = parseInt(document.getElementById('resultTimeInput').value, 10);
            if (isNaN(resultSec) || resultSec < 5) { showStatus(false, 'Mindestens 5 Sekunden'); return; }
            sendAction('set_timers', { result_duration: resultSec });
        }

        function toggleGlobalTimer(state) {
            sendAction('control_global_timer', { state });
        }

        function adjustTimerSize(delta) {
            currentTimerSize = Math.max(1.0, Math.min(12.0, currentTimerSize + delta));
            document.getElementById('timerSizeDisplay').textContent = currentTimerSize.toFixed(1) + ' rem';
            sendAction('set_timer_size', { size: currentTimerSize });
        }
    </script>
</body>
</html>
