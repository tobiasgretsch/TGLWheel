<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glücksrad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <!-- OVERLAYS (Always Visible) -->
    <div id="global-timer">00:00</div>

    <div id="score-left" class="score-board">
        <div class="score-label">Heim</div>
        <div class="score-val" id="score-val-left">0</div>
    </div>

    <div id="score-right" class="score-board">
        <div class="score-label">Gast</div>
        <div class="score-val" id="score-val-right">0</div>
    </div>

    <!-- 1. THE WHEEL STAGE -->
    <div id="wheel-stage" class="stage">
        <div class="wheel-wrapper">
            <div class="indicator" id="indicator"></div>
            <canvas id="wheelCanvas" width="600" height="600"></canvas>
            <div class="wheel-hub">
                <img src="{{ url_for('static', filename='tg_logo.png') }}" alt="Logo">
            </div>
        </div>
    </div>

    <!-- 2. THE FLOATING ANIMATION IMAGE -->
    <img id="floating-img" class="hidden" src="" alt="Gewinner">

    <!-- 3. THE TIMER STAGE (Result screen) -->
    <div id="timer-stage" class="stage hidden">
        <div id="winner-text" class="winner-text"></div>
        <div class="timer-content">
            <div id="timer-display">00:00</div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
