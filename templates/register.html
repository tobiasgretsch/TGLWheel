<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spieleranmeldung</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: #1a2332;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            color: #ffffff;
        }
        .card {
            width: 90%; max-width: 400px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 18px;
            padding: 32px 24px;
            text-align: center;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 1.5rem;
            font-weight: 800;
        }
        p {
            margin: 0 0 24px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
        }
        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            font-size: 1.1rem;
            font-family: inherit;
            font-weight: 600;
            color: #ffffff;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            outline: none;
            margin-bottom: 16px;
        }
        input[type="text"]:focus {
            border-color: rgba(255,255,255,0.35);
        }
        input[type="text"]::placeholder {
            color: rgba(255,255,255,0.3);
        }
        button {
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #ffffff;
            background: #27ae60;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
        }
        button:active { transform: scale(0.97); }
        button:hover { opacity: 0.88; }
        button:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
        .msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            display: none;
        }
        .msg.ok { display: block; background: rgba(39,174,96,0.2); color: #27ae60; }
        .msg.err { display: block; background: rgba(231,76,60,0.2); color: #e74c3c; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Spieleranmeldung</h1>
        <p>Gib deinen Namen ein, um teilzunehmen.</p>
        <input type="text" id="nameInput" placeholder="Dein Name" maxlength="50" autocomplete="off">
        <button id="submitBtn">ANMELDEN</button>
        <div id="msg" class="msg"></div>
    </div>

    <script>
        const nameInput = document.getElementById('nameInput');
        const submitBtn = document.getElementById('submitBtn');
        const msgEl = document.getElementById('msg');

        function showMsg(ok, text) {
            msgEl.textContent = text;
            msgEl.className = 'msg ' + (ok ? 'ok' : 'err');
        }

        function submit() {
            const name = nameInput.value.trim();
            if (!name) { showMsg(false, 'Bitte gib deinen Namen ein.'); return; }

            submitBtn.disabled = true;
            fetch('/api/register_player', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            })
            .then(res => res.json().then(data => ({ ok: res.ok, data })))
            .then(({ ok, data }) => {
                if (ok) {
                    showMsg(true, 'Erfolgreich angemeldet! Weiterleitung...');
                    nameInput.value = '';
                    nameInput.disabled = true;
                    setTimeout(() => { window.location.href = '/teams'; }, 1500);
                } else {
                    showMsg(false, data.message || 'Fehler bei der Anmeldung.');
                    submitBtn.disabled = false;
                }
            })
            .catch(() => {
                showMsg(false, 'Verbindungsfehler. Bitte erneut versuchen.');
                submitBtn.disabled = false;
            });
        }

        submitBtn.addEventListener('click', submit);
        nameInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submit();
        });
    </script>
</body>
</html>
