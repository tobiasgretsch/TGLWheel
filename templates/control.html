<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steuerung</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='tokens.css') }}">
    <style>

        *, *::before, *::after { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: var(--color-bg);
            color: var(--color-text);
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--color-text-muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        /* --- PANELS --- */
        .panel {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: 20px;
        }

        h2 {
            margin: 0 0 16px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--color-text-muted);
        }

        /* --- ROWS --- */
        .row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .row:last-child { margin-bottom: 0; }
        .row-center { align-items: center; }

        .btn-square { flex: 0; min-width: 52px; }

        .size-display {
            min-width: 60px;
            text-align: center;
            font-weight: 700;
        }

        label {
            flex: 1;
            min-width: 160px;
            font-size: 0.9rem;
            color: var(--color-text-muted);
        }

        input[type="number"] {
            width: 90px;
            padding: 10px 12px;
            text-align: center;
            font-size: 1rem;
            font-family: inherit;
            font-weight: 600;
            color: var(--color-text);
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            outline: none;
        }

        input[type="number"]:focus {
            border-color: rgba(255,255,255,0.35);
        }

        /* --- BUTTONS --- */
        button {
            flex: 1;
            min-height: 52px;
            padding: 0 16px;
            font-size: 0.9rem;
            font-family: inherit;
            font-weight: 700;
            letter-spacing: 0.05em;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: #ffffff;
            transition: opacity 0.15s, transform 0.1s;
        }

        button:active  { transform: scale(0.97); }
        button:hover   { opacity: 0.88; }
        button:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

        .btn-green  { background: var(--btn-green); }
        .btn-blue   { background: var(--btn-blue); }
        .btn-red    { background: var(--btn-red); }
        .btn-orange { background: var(--btn-orange); }

        /* --- DIVIDER --- */
        hr {
            border: none;
            border-top: 1px solid var(--color-border);
            margin: 16px 0;
        }

        /* --- SCOREBOARD --- */
        .score-ctrl {
            display: flex;
            gap: 12px;
        }

        .score-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            padding: 16px 12px;
        }

        .score-box-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--color-text-muted);
        }

        .score-box button {
            width: 100%;
        }

        .btn-score-plus {
            min-height: 68px;
            font-size: 1.8rem;
        }

        .btn-score-minus {
            min-height: 44px;
            font-size: 1rem;
        }

        .btn-full {
            width: 100%;
            margin-top: 12px;
        }

        /* --- EVENT CHECKLIST --- */
        .event-check-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--color-border);
            cursor: pointer;
            margin-bottom: 8px;
            min-height: 66px;
            user-select: none;
            transition: opacity 0.2s;
        }

        .event-check-item:last-child { margin-bottom: 0; }

        .event-check-item input[type=checkbox] {
            width: 28px;
            height: 28px;
            cursor: pointer;
            accent-color: var(--btn-green);
            flex-shrink: 0;
        }

        .event-check-item img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .event-check-item span {
            font-size: 1rem;
            font-weight: 600;
            flex: 1;
        }

        .event-check-item.event-off {
            opacity: 0.38;
        }

        /* --- POPUP OVERLAY --- */
        .popup-overlay {
            position: fixed;
            inset: 0;
            z-index: 800;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s;
        }
        .popup-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .popup-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg, 18px);
            padding: 28px 24px;
            width: 90%;
            max-width: 420px;
            position: relative;
        }
        .popup-card h2 {
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        .popup-close {
            position: absolute;
            top: 14px;
            right: 14px;
            background: none;
            border: none;
            color: var(--color-text-muted);
            font-size: 1.4rem;
            min-height: auto;
            min-width: auto;
            flex: 0;
            padding: 4px 8px;
            cursor: pointer;
        }
        .popup-close:hover { color: var(--color-text); }
        .popup-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        .popup-row label {
            flex: 1;
            min-width: 0;
        }
        .popup-row input[type="number"] {
            width: 80px;
        }
        .popup-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        .popup-actions button, .popup-actions a {
            text-align: center;
            text-decoration: none;
        }
        .btn-link {
            display: block;
            padding: 12px 16px;
            font-size: 0.85rem;
            font-family: inherit;
            font-weight: 700;
            letter-spacing: 0.05em;
            border: 2px solid var(--btn-blue);
            border-radius: var(--radius-sm);
            color: var(--btn-blue);
            background: transparent;
            cursor: pointer;
            transition: opacity 0.15s;
            min-height: auto;
            flex: 0;
        }
        .btn-link:hover { opacity: 0.8; }

        /* --- MATCH SELECTOR --- */
        .match-select {
            width: 100%;
            padding: 12px 14px;
            font-size: 0.95rem;
            font-family: inherit;
            font-weight: 600;
            color: var(--color-text);
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            outline: none;
            appearance: none;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .match-select:focus { border-color: rgba(255,255,255,0.35); }
        .match-select option { background: #1a2332; color: #fff; }
        .match-info {
            text-align: center;
            font-size: 0.8rem;
            color: var(--color-text-muted);
            margin-bottom: 12px;
        }
        .match-info.active {
            color: var(--btn-green);
            font-weight: 700;
            font-size: 0.85rem;
        }

        /* --- STATUS TOAST --- */
        #status-msg {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.25s;
            pointer-events: none;
        }

        #status-msg.show { opacity: 1; }
        #status-msg.ok   { background: var(--btn-green); }
        #status-msg.err  { background: var(--btn-red); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Steuerung</h1>

        <!-- SPIELSTEUERUNG -->
        <div class="panel">
            <h2>Spielsteuerung</h2>
            <div class="row">
                <button class="btn-green" data-action="spin">RAD DREHEN</button>
                <button class="btn-orange" data-action="reset">ZURÜCKSETZEN</button>
            </div>
            <div class="row">
                <button class="btn-blue" id="eventsBtn" data-action="toggle-events">EREIGNISSE ANZEIGEN</button>
            </div>
        </div>

        <!-- TIMER -->
        <div class="panel">
            <h2>Timer</h2>

            <div class="row">
                <label>Spielzeit (Minuten):</label>
                <input type="number" id="globalTimeInput" value="10" min="1">
                <button class="btn-blue" data-action="set-timers">SETZEN</button>
            </div>
            <div class="row">
                <button class="btn-green" id="startBtn" data-action="timer-start">START</button>
                <button class="btn-red" id="pauseBtn" data-action="timer-stop">PAUSE</button>
            </div>

            <hr>

            <div class="row">
                <label>Ergebnisanzeige (Sekunden):</label>
                <input type="number" id="resultTimeInput" value="60" min="5">
                <button class="btn-blue" data-action="set-result-duration">ÜBERNEHMEN</button>
            </div>

            <hr>

            <div class="row row-center">
                <label>Spielzeit-Schriftgröße:</label>
                <button class="btn-red btn-square" data-action="timer-size-down">−</button>
                <span id="timerSizeDisplay" class="size-display">3.0 rem</span>
                <button class="btn-green btn-square" data-action="timer-size-up">+</button>
            </div>
        </div>

        <!-- SPIELSTAND -->
        <div class="panel">
            <h2>Spielstand</h2>
            <div class="score-ctrl">
                <div class="score-box">
                    <div class="score-box-label">Heim</div>
                    <button class="btn-green btn-score-plus" data-action="score" data-side="left" data-change="1">+1</button>
                    <button class="btn-red   btn-score-minus" data-action="score" data-side="left" data-change="-1">−1</button>
                </div>
                <div class="score-box">
                    <div class="score-box-label">Gast</div>
                    <button class="btn-green btn-score-plus" data-action="score" data-side="right" data-change="1">+1</button>
                    <button class="btn-red   btn-score-minus" data-action="score" data-side="right" data-change="-1">−1</button>
                </div>
            </div>
            <button class="btn-orange btn-full" data-action="reset_scores">SPIELSTAND ZURÜCKSETZEN</button>

            <hr>

            <div class="row row-center">
                <label>Punkte-Schriftgröße:</label>
                <button class="btn-red btn-square" data-action="score-size-down">−</button>
                <span id="scoreSizeDisplay" class="size-display">5.0 rem</span>
                <button class="btn-green btn-square" data-action="score-size-up">+</button>
            </div>
        </div>
        <!-- AKTUELLES SPIEL -->
        <div id="match-panel" class="panel" style="display:none">
            <h2>Aktuelles Spiel</h2>
            <select id="matchSelect" class="match-select">
                <option value="-1">— Spiel wählen —</option>
            </select>
            <div id="matchInfo" class="match-info">Kein Spiel ausgewählt</div>
            <div class="row">
                <button class="btn-green" data-action="activate-match" style="flex:1">SPIEL LADEN</button>
                <button class="btn-orange" data-action="confirm-score" style="flex:1">ERGEBNIS ÜBERNEHMEN</button>
            </div>
        </div>

        <!-- TURNIER -->
        <div class="panel">
            <h2>Turnier</h2>
            <button class="btn-blue" data-action="open-tournament" style="width:100%">TURNIEREINSTELLUNGEN</button>
        </div>

        <!-- EREIGNISSE AUF DEM RAD -->
        <div class="panel">
            <h2>Ereignisse auf dem Rad</h2>
            <div id="events-checklist"></div>
        </div>
    </div>

    <!-- TOURNAMENT SETTINGS POPUP -->
    <div id="tournament-popup" class="popup-overlay">
        <div class="popup-card">
            <button class="popup-close" data-action="close-tournament">&times;</button>
            <h2>Turniereinstellungen</h2>
            <div class="popup-row">
                <label>Anzahl Teams:</label>
                <input type="number" id="numTeamsInput" value="4" min="2" max="20">
            </div>
            <div class="popup-row">
                <label>Spiele pro Paarung:</label>
                <input type="number" id="numGamesInput" value="1" min="1" max="3">
            </div>
            <div class="popup-actions">
                <button class="btn-green" data-action="save-tournament">SPEICHERN</button>
                <a href="/teams" target="_blank" class="btn-link">TEAMVERWALTUNG ÖFFNEN</a>
            </div>
        </div>
    </div>

    <div id="status-msg"></div>

    <script>
        let statusTimeout = null;
        let allEventItems = [];   // full list from API
        let disabledSet = new Set();
        let timerEverStarted = false;
        let timerRunning = false;

        // --- SSE: keep checkboxes and timer buttons in sync ---
        const ctrlStream = new EventSource('/api/stream');
        ctrlStream.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.disabled_events !== undefined) {
                disabledSet = new Set(data.disabled_events);
                syncCheckboxes();
            }
            if (data.config) {
                timerRunning = data.config.global_timer_running;
                updateTimerBtns();
            }
            if (data.command === 'reset') {
                timerEverStarted = false;
                updateTimerBtns();
            }
        };

        function updateTimerBtns() {
            const startBtn = document.getElementById('startBtn');
            const pauseBtn = document.getElementById('pauseBtn');
            startBtn.textContent = timerEverStarted ? 'WEITER' : 'START';
            startBtn.disabled = timerRunning;
            pauseBtn.disabled = !timerRunning;
        }

        function syncCheckboxes() {
            document.querySelectorAll('#events-checklist input[type=checkbox]').forEach(cb => {
                const active = !disabledSet.has(cb.dataset.filename);
                cb.checked = active;
                cb.closest('label').classList.toggle('event-off', !active);
            });
        }

        function loadEventChecklist(status) {
            fetch('/api/get_wheel_data').then(r => r.json()).then(items => {
                allEventItems = items;
                disabledSet = new Set((status && status.disabled_events) || []);
                const container = document.getElementById('events-checklist');
                container.innerHTML = items.map(item => {
                    const filename = item.path.split('/').pop();
                    const active = !disabledSet.has(filename);
                    return `<label class="event-check-item${active ? '' : ' event-off'}">
                        <input type="checkbox" ${active ? 'checked' : ''}
                               data-filename="${filename}"
                               onchange="onEventCheckChange(this)">
                        <img src="/static/${item.path}" alt="">
                        <span>${item.text}</span>
                    </label>`;
                }).join('');
            });
        }

        function onEventCheckChange(cb) {
            cb.closest('label').classList.toggle('event-off', !cb.checked);
            const disabled = [];
            document.querySelectorAll('#events-checklist input[type=checkbox]').forEach(c => {
                if (!c.checked) disabled.push(c.dataset.filename);
            });
            disabledSet = new Set(disabled);
            sendAction('set_disabled_events', { events: disabled });
        }

        let currentTimerSize = 3.0;
        let eventsVisible = false;
        let currentScoreSize = 5.0;

        // Single init fetch — shared by event checklist and config sync.
        fetch('/api/check_status')
            .then(r => r.json())
            .then(s => {
                loadEventChecklist(s);
                if (s.config && s.config.global_timer_size !== undefined) {
                    currentTimerSize = s.config.global_timer_size;
                    document.getElementById('timerSizeDisplay').textContent = currentTimerSize.toFixed(1) + ' rem';
                }
                if (s.config && s.config.score_size !== undefined) {
                    currentScoreSize = s.config.score_size;
                    document.getElementById('scoreSizeDisplay').textContent = currentScoreSize.toFixed(1) + ' rem';
                }
                if (s.show_events !== undefined) {
                    eventsVisible = s.show_events;
                    updateEventsBtn();
                }
                if (s.config) {
                    const configured = parseInt(document.getElementById('globalTimeInput').value, 10) * 60;
                    timerRunning = s.config.global_timer_running;
                    if (timerRunning || s.config.global_time_remaining < configured - 1) {
                        timerEverStarted = true;
                    }
                    updateTimerBtns();
                }
            });

        function showStatus(ok, text) {
            const el = document.getElementById('status-msg');
            el.textContent = text;
            el.className = 'show ' + (ok ? 'ok' : 'err');
            clearTimeout(statusTimeout);
            statusTimeout = setTimeout(() => { el.className = ''; }, 2000);
        }

        function sendAction(action, payload = {}) {
            fetch('/api/send_command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action, payload })
            })
            .then(res => {
                if (!res.ok) throw new Error(`Server error ${res.status}`);
                showStatus(true, action + ' gesendet');
            })
            .catch(err => showStatus(false, 'Fehler: ' + err.message));
        }

        function updateScore(side, change) {
            sendAction('update_score', { side, change });
        }

        function setTimers() {
            const globalMin = parseInt(document.getElementById('globalTimeInput').value, 10);
            if (isNaN(globalMin) || globalMin < 1) { showStatus(false, 'Ungültiger Wert'); return; }
            timerEverStarted = false;
            timerRunning = false;
            updateTimerBtns();
            sendAction('set_timers', { global_time: globalMin * 60 });
        }

        function setResultDuration() {
            const resultSec = parseInt(document.getElementById('resultTimeInput').value, 10);
            if (isNaN(resultSec) || resultSec < 5) { showStatus(false, 'Mindestens 5 Sekunden'); return; }
            sendAction('set_timers', { result_duration: resultSec });
        }

        function toggleGlobalTimer(state) {
            if (state === 'start') {
                timerEverStarted = true;
                timerRunning = true;
            } else {
                timerRunning = false;
            }
            updateTimerBtns();
            sendAction('control_global_timer', { state });
        }

        function adjustTimerSize(delta) {
            currentTimerSize = Math.max(1.0, Math.min(12.0, currentTimerSize + delta));
            document.getElementById('timerSizeDisplay').textContent = currentTimerSize.toFixed(1) + ' rem';
            sendAction('set_timer_size', { size: currentTimerSize });
        }

        function adjustScoreSize(delta) {
            currentScoreSize = Math.max(1.0, Math.min(20.0, currentScoreSize + delta));
            document.getElementById('scoreSizeDisplay').textContent = currentScoreSize.toFixed(1) + ' rem';
            sendAction('set_score_size', { size: currentScoreSize });
        }

        function toggleEvents() {
            eventsVisible = !eventsVisible;
            updateEventsBtn();
            sendAction('toggle_events');
        }

        function updateEventsBtn() {
            document.getElementById('eventsBtn').textContent =
                eventsVisible ? 'EREIGNISSE VERBERGEN' : 'EREIGNISSE ANZEIGEN';
        }

        // --- MATCH SELECTOR ---
        const matchPanel = document.getElementById('match-panel');
        const matchSelect = document.getElementById('matchSelect');
        const matchInfo = document.getElementById('matchInfo');
        let tournamentSchedule = [];

        function loadTournamentSchedule() {
            fetch('/api/team_state')
                .then(r => r.json())
                .then(data => {
                    tournamentSchedule = data.schedule || [];
                    if (data.phase === 'teams_created' && tournamentSchedule.length > 0) {
                        matchPanel.style.display = '';
                        populateMatchSelect(tournamentSchedule);
                    } else {
                        matchPanel.style.display = 'none';
                    }
                })
                .catch(() => { matchPanel.style.display = 'none'; });
        }

        function populateMatchSelect(schedule) {
            matchSelect.innerHTML = '<option value="-1">— Spiel wählen —</option>';
            schedule.forEach((m, i) => {
                const played = m.score_home !== null;
                const label = `Spiel ${m.game}: ${m.home} vs ${m.away}` +
                    (played ? ` (${m.score_home}:${m.score_away})` : '');
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = label;
                if (played) opt.style.opacity = '0.5';
                matchSelect.appendChild(opt);
            });
        }

        matchSelect.addEventListener('change', () => {
            const idx = parseInt(matchSelect.value, 10);
            if (idx >= 0 && idx < tournamentSchedule.length) {
                const m = tournamentSchedule[idx];
                matchInfo.textContent = `${m.home} vs ${m.away}`;
                matchInfo.className = 'match-info';
            } else {
                matchInfo.textContent = 'Kein Spiel ausgewählt';
                matchInfo.className = 'match-info';
            }
        });

        function activateMatch() {
            const idx = parseInt(matchSelect.value, 10);
            if (idx < 0) { showStatus(false, 'Bitte Spiel wählen'); return; }
            sendAction('set_active_match', { game_index: idx });
            const m = tournamentSchedule[idx];
            matchInfo.textContent = `Aktiv: ${m.home} vs ${m.away}`;
            matchInfo.className = 'match-info active';
        }

        function confirmMatchScore() {
            sendAction('confirm_match_score');
            matchInfo.textContent = 'Ergebnis gespeichert!';
            matchInfo.className = 'match-info';
            matchSelect.value = '-1';
            // Refresh the schedule to show updated scores
            setTimeout(loadTournamentSchedule, 500);
        }

        // Load schedule on page load
        loadTournamentSchedule();

        // --- TOURNAMENT SETTINGS ---
        const tournamentPopup = document.getElementById('tournament-popup');

        function openTournament() {
            fetch('/api/team_state')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('numTeamsInput').value = data.settings.num_teams;
                    document.getElementById('numGamesInput').value = data.settings.num_games;
                    tournamentPopup.classList.add('visible');
                })
                .catch(() => {
                    tournamentPopup.classList.add('visible');
                });
        }

        function closeTournament() {
            tournamentPopup.classList.remove('visible');
        }

        function saveTournament() {
            const numTeams = parseInt(document.getElementById('numTeamsInput').value, 10);
            const numGames = parseInt(document.getElementById('numGamesInput').value, 10);
            if (isNaN(numTeams) || numTeams < 2 || numTeams > 20) {
                showStatus(false, 'Teams: 2–20');
                return;
            }
            if (isNaN(numGames) || numGames < 1 || numGames > 3) {
                showStatus(false, 'Spiele: 1–3');
                return;
            }
            fetch('/api/team_command', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'update_settings',
                    payload: { num_teams: numTeams, num_games: numGames }
                })
            })
            .then(res => {
                if (!res.ok) throw new Error('Server error');
                showStatus(true, 'Einstellungen gespeichert');
                closeTournament();
                setTimeout(loadTournamentSchedule, 500);
            })
            .catch(err => showStatus(false, 'Fehler: ' + err.message));
        }

        // Close popup on overlay click (not on card click)
        tournamentPopup.addEventListener('click', (e) => {
            if (e.target === tournamentPopup) closeTournament();
        });

        // --- DELEGATED CLICK HANDLER ---
        document.body.addEventListener('click', (e) => {
            const btn = e.target.closest('[data-action]');
            if (!btn) return;

            const action = btn.dataset.action;
            switch (action) {
                case 'spin':
                case 'reset':
                case 'reset_scores':
                    sendAction(action);
                    break;
                case 'toggle-events':
                    toggleEvents();
                    break;
                case 'set-timers':
                    setTimers();
                    break;
                case 'set-result-duration':
                    setResultDuration();
                    break;
                case 'timer-start':
                    toggleGlobalTimer('start');
                    break;
                case 'timer-stop':
                    toggleGlobalTimer('stop');
                    break;
                case 'timer-size-up':
                    adjustTimerSize(+0.5);
                    break;
                case 'timer-size-down':
                    adjustTimerSize(-0.5);
                    break;
                case 'score':
                    updateScore(btn.dataset.side, parseInt(btn.dataset.change, 10));
                    break;
                case 'score-size-up':
                    adjustScoreSize(+0.5);
                    break;
                case 'score-size-down':
                    adjustScoreSize(-0.5);
                    break;
                case 'activate-match':
                    activateMatch();
                    break;
                case 'confirm-score':
                    confirmMatchScore();
                    break;
                case 'open-tournament':
                    openTournament();
                    break;
                case 'close-tournament':
                    closeTournament();
                    break;
                case 'save-tournament':
                    saveTournament();
                    break;
            }
        });
    </script>
</body>
</html>
